function UserManager({user,onBack,onLogout}){
  const [users,setUsers]=useState(()=>getUsers());
  const [editKey,setEditKey]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [toast,setToast]=useState('');
  const [newUser,setNewUser]=useState({name:'',login:'',role:'subgerente',pwd:PWD_2026});
  const toastRef=useRef();
  const ROLES={subgerente:'Subgerente',gerente:'Gerente',gerencia:'Gerência',suporte:'Suporte',ceo:'CEO'};
  const ROLE_COLORS={subgerente:'var(--brand)',gerente:'var(--ok)',gerencia:'#0F4C81',suporte:'#2563EB',ceo:'#1A1A1A'};
  function showMsg(msg){setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(''),2500);}
  function saveAndRefresh(updated){saveUsers(updated);setUsers({...updated});showMsg('✅ Salvo com sucesso!');}
  function toggleActive(key){const u={...users};u[key]={...u[key],active:u[key].active===false?true:false};saveAndRefresh(u);}
  function resetPwd(key){if(!window.confirm('Resetar senha para 2026?'))return;const u={...users};u[key]={...u[key],pwd:PWD_2026,first:false};saveAndRefresh(u);showMsg('🔑 Senha resetada para 2026.');}
  function saveEdit(key,fields){const u={...users};u[key]={...u[key],...fields};saveAndRefresh(u);setEditKey(null);}
  function deleteUser(key){if(!window.confirm('Remover este usuário?'))return;const u={...users};delete u[key];saveAndRefresh(u);showMsg('🗑️ Usuário removido.');}
  function createUser(){
    if(!newUser.name.trim()||!newUser.login.trim()){showMsg('❌ Nome e login obrigatórios.');return;}
    const key=newUser.login.trim().toLowerCase().replace(/\s/g,'');
    if(users[key]){showMsg('❌ Login já existe.');return;}
    const u={...users};u[key]={name:newUser.name.trim(),login:key,role:newUser.role,pwd:newUser.pwd||PWD_2026,first:false,color:ROLE_COLORS[newUser.role]||'#555',active:true};
    saveAndRefresh(u);setNewUser({name:'',login:'',role:'subgerente',pwd:PWD_2026});setShowNew(false);showMsg('✅ Usuário criado!');
  }
  const userList=Object.entries(users);
  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',paddingBottom:80}}>
      <div className="um-hdr"><div className="um-hdr-inner"><div><div style={{fontSize:10,opacity:.7,fontWeight:700,letterSpacing:2,textTransform:'uppercase'}}>Koncluí · Suporte</div><div style={{fontFamily:"'Sora',sans-serif",fontSize:17,fontWeight:800}}>👥 Gestão de Usuários</div></div><div style={{display:'flex',gap:6}}><button onClick={onBack} className="hdr-btn">← Hub</button><button onClick={onLogout} className="hdr-btn">Sair</button></div></div></div>
      {toast&&<div style={{position:'fixed',top:70,left:'50%',transform:'translateX(-50%)',background:'#1A1A1A',color:'#fff',padding:'9px 20px',borderRadius:99,fontSize:13,fontWeight:600,zIndex:9999,whiteSpace:'nowrap',boxShadow:'0 8px 24px rgba(0,0,0,.3)'}}>{toast}</div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,padding:'14px 14px 0'}}>
        {[['Total',userList.length,'#2563EB'],['Ativos',userList.filter(([,u])=>u.active!==false).length,'var(--ok)'],['Inativos',userList.filter(([,u])=>u.active===false).length,'var(--ink3)']].map(([l,v,c])=>(
          <div key={l} style={{background:'#fff',borderRadius:'var(--r12)',padding:'12px 8px',textAlign:'center',boxShadow:'var(--sh1)'}}><div style={{fontFamily:"'Sora',sans-serif",fontSize:22,fontWeight:900,color:c}}>{v}</div><div style={{fontSize:10,color:'var(--ink3)',fontWeight:700,textTransform:'uppercase',marginTop:2}}>{l}</div></div>
        ))}
      </div>
      <div style={{margin:'14px 14px 0',background:'#fff',borderRadius:'var(--r12)',boxShadow:'var(--sh1)',overflow:'hidden'}}>
        <div style={{padding:'14px 16px',borderBottom:'1px solid var(--line)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700}}>Usuários do Sistema</div>
          <button onClick={()=>setShowNew(s=>!s)} style={{background:'#2563EB',color:'#fff',borderRadius:'var(--r8)',padding:'7px 14px',fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700}}>{showNew?'✕ Cancelar':'+ Novo Usuário'}</button>
        </div>
        {showNew&&(
          <div style={{padding:'16px',background:'#F0F4FF',borderBottom:'1px solid var(--line)'}}>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:800,color:'#2563EB',marginBottom:12,textTransform:'uppercase',letterSpacing:.5}}>+ Criar Novo Usuário</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <div className="f-group"><label className="f-label">Nome *</label><input className="f-input" value={newUser.name} onChange={e=>setNewUser(n=>({...n,name:e.target.value}))} placeholder="Nome completo"/></div>
              <div className="f-group"><label className="f-label">Login *</label><input className="f-input" value={newUser.login} onChange={e=>setNewUser(n=>({...n,login:e.target.value.toLowerCase()}))} placeholder="login"/></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div className="f-group"><label className="f-label">Role</label><select className="f-input" value={newUser.role} onChange={e=>setNewUser(n=>({...n,role:e.target.value}))}>{Object.entries(ROLES).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div>
              <div className="f-group"><label className="f-label">Senha inicial</label><input className="f-input" value={newUser.pwd===PWD_2026?'2026':newUser.pwd} onChange={e=>setNewUser(n=>({...n,pwd:e.target.value}))} placeholder="2026"/></div>
            </div>
            <button onClick={createUser} style={{width:'100%',padding:'12px',background:'#2563EB',color:'#fff',borderRadius:'var(--r8)',fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:800}}>CRIAR USUÁRIO</button>
          </div>
        )}
        {userList.map(([key,u])=>{
          const isEdit=editKey===key;const inactive=u.active===false;
          return(
            <div key={key} style={{padding:'14px 16px',borderBottom:'1px solid var(--line)',opacity:inactive?.5:1}}>
              {!isEdit?(
                <div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:36,height:36,borderRadius:'50%',background:u.color||'#555',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:14,flexShrink:0}}>{u.name.charAt(0)}</div>
                      <div><div style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700}}>{u.name} {inactive&&<span style={{fontSize:10,color:'var(--ink3)'}}>(inativo)</span>}</div><div style={{fontSize:11,color:'var(--ink3)',marginTop:1}}>@{u.login} · <span style={{background:(ROLE_COLORS[u.role]||'#555')+'22',color:ROLE_COLORS[u.role]||'#555',borderRadius:99,padding:'1px 7px',fontSize:10,fontWeight:700}}>{ROLES[u.role]||u.role}</span></div></div>
                    </div>
                    <div style={{display:'flex',gap:5,flexWrap:'wrap',justifyContent:'flex-end'}}>
                      <button onClick={()=>setEditKey(key)} style={{background:'#F0F0F0',color:'var(--ink)',borderRadius:'var(--r8)',padding:'5px 10px',fontSize:11,fontWeight:700}}>✏️ Editar</button>
                      <button onClick={()=>resetPwd(key)} style={{background:'#FEF3C7',color:'#92400E',borderRadius:'var(--r8)',padding:'5px 10px',fontSize:11,fontWeight:700}}>🔑 Senha</button>
                      <button onClick={()=>toggleActive(key)} style={{background:inactive?'#D1FAE5':'#FEE2E2',color:inactive?'#065F46':'#991B1B',borderRadius:'var(--r8)',padding:'5px 10px',fontSize:11,fontWeight:700}}>{inactive?'✅ Ativar':'⛔ Desativar'}</button>
                      {key!=='camila'&&key!=='bruna'&&<button onClick={()=>deleteUser(key)} style={{background:'#FEE2E2',color:'#991B1B',borderRadius:'var(--r8)',padding:'5px 10px',fontSize:11,fontWeight:700}}>🗑</button>}
                    </div>
                  </div>
                </div>
              ):(
                <EditUserForm u={u} uKey={key} roles={ROLES} onSave={(fields)=>saveEdit(key,fields)} onCancel={()=>setEditKey(null)}/>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function EditUserForm({u,uKey,roles,onSave,onCancel}){
  const [name,setName]=useState(u.name);const [role,setRole]=useState(u.role);const [color,setColor]=useState(u.color||'#555555');
  return(
    <div style={{background:'#F8F8F8',borderRadius:'var(--r8)',padding:'12px'}}>
      <div style={{fontFamily:"'Sora',sans-serif",fontSize:11,fontWeight:800,color:'#2563EB',marginBottom:10,textTransform:'uppercase'}}>Editando: @{uKey}</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
        <div className="f-group" style={{marginBottom:0}}><label className="f-label">Nome</label><input className="f-input" value={name} onChange={e=>setName(e.target.value)}/></div>
        <div className="f-group" style={{marginBottom:0}}><label className="f-label">Role</label><select className="f-input" value={role} onChange={e=>setRole(e.target.value)}>{Object.entries(roles).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div>
      </div>
      <div className="f-group" style={{marginBottom:10}}><label className="f-label">Cor do avatar</label><input className="f-input" type="color" value={color} onChange={e=>setColor(e.target.value)} style={{height:40,padding:'4px'}}/></div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>onSave({name,role,color})} style={{flex:1,padding:'10px',background:'#2563EB',color:'#fff',borderRadius:'var(--r8)',fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700}}>💾 Salvar</button>
        <button onClick={onCancel} style={{flex:1,padding:'10px',background:'#F0F0F0',color:'var(--ink)',borderRadius:'var(--r8)',fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700}}>Cancelar</button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   ROOT APP
══════════════════════════════════════ */
function App(){
  const [phase,setPhase]=useState('loading');
  const [user,setUser]=useState(null);
  const [userKey,setUserKey]=useState(null);

  useEffect(()=>{
    const s=getSession();
    if(s){const users=getUsers(),u=users[s.key];if(u&&!u.first){setUser(u);setUserKey(s.key);setPhase('app');}else setPhase('login');}
    else setPhase('login');
  },[]);

  function onLogin(u,key){setUser(u);setUserKey(key);saveSession({key});setPhase('app');}
  function onLogout(){clearSession();setUser(null);setUserKey(null);setPhase('login');}

  if(phase==='loading')return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#1A1A1A'}}><div style={{color:'#fff',fontFamily:"'Sora',sans-serif",fontSize:15}}>🥟 Carregando...</div></div>;
  if(phase==='login')return<Login onLogin={onLogin}/>;

  if(phase==='app'){
    if(user.role==='ceo')return<CEODashboard user={user} onLogout={onLogout}/>;
    if(user.role==='suporte')return<SuporteHub user={user} onLogout={onLogout}/>;
    if(user.role==='gerente')return<GerenteHub user={user} onLogout={onLogout}/>;
    if(user.role==='gerencia')return<GerenciaHub user={user} onLogout={onLogout}/>;
    return<ChecklistScreen user={user} onLogout={onLogout}/>;
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
